<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logbook · Projeto Eterno</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0d0d0d;--surface:#161616;--card:#1e1e1e;--border:#2a2a2a;
    --red:#e03030;--red-dim:#7a1a1a;--text:#f0f0f0;--muted:#888;--done:#2ecc71;
    --suggest:#1a3a2a;--up:#2ecc71;--down:#e03030;--same:#888;
  }
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}

  /* HEADER */
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 20px 14px;position:sticky;top:0;z-index:100;}
  .header-row{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--red);line-height:1;}
  .subtitle{color:var(--muted);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;}
  .week-nav{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap;}
  .week-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:5px 13px;border-radius:20px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;transition:all .15s;}
  .week-btn:hover{border-color:var(--red);color:var(--text);}
  .week-btn.active{background:var(--red);border-color:var(--red);color:#fff;font-weight:600;}

  /* TABS inside week */
  .view-tabs{display:flex;gap:0;margin-bottom:16px;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .view-tab{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);background:var(--card);border:none;transition:all .15s;}
  .view-tab.active{background:var(--red);color:#fff;}

  /* MAIN */
  main{padding:20px 16px 80px;max-width:920px;margin:0 auto;}
  .week-block{display:none;}
  .week-block.visible{display:block;}
  .week-view{display:none;}
  .week-view.visible{display:block;}
  .week-title{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;margin-bottom:4px;}
  .week-meta{color:var(--muted);font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;}

  /* SUMMARY BAR */
  .summary-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;gap:24px;flex-wrap:wrap;}
  .stat{text-align:center;}
  .stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--red);line-height:1;}
  .stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

  /* DAY CARD */
  .day-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden;}
  .day-header{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;user-select:none;transition:background .15s;}
  .day-header:hover{background:rgba(255,255,255,.03);}
  .day-badge{background:var(--red-dim);color:var(--red);font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;padding:3px 10px;border-radius:5px;white-space:nowrap;}
  .day-name{font-weight:600;font-size:13px;flex:1;}
  .day-progress{font-size:11px;color:var(--muted);white-space:nowrap;}
  .day-progress.done{color:var(--done);}
  .chevron{color:var(--muted);font-size:12px;transition:transform .2s;}
  .day-card.open .chevron{transform:rotate(180deg);}
  .day-body{display:none;padding:0 16px 16px;}
  .day-card.open .day-body{display:block;}

  /* TABLE */
  .ex-table{width:100%;border-collapse:collapse;margin-top:4px;}
  .ex-table th{text-align:left;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:6px 8px;border-bottom:1px solid var(--border);}
  .ex-table th.center{text-align:center;}
  .ex-table td{padding:9px 8px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
  .ex-table tr:last-child td{border-bottom:none;}
  .ex-name{font-weight:500;font-size:13px;}
  .ex-meta{font-size:11px;color:var(--muted);margin-top:2px;}
  .ex-tempo{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:var(--red);}

  /* CARGA */
  .carga-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
  .carga-cell{display:flex;align-items:center;gap:5px;}
  .carga-input{background:var(--surface);border:1px solid var(--border);color:var(--text);width:62px;padding:5px 6px;border-radius:6px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;text-align:center;transition:border-color .15s;-moz-appearance:textfield;}
  .carga-input::-webkit-outer-spin-button,.carga-input::-webkit-inner-spin-button{-webkit-appearance:none;}
  .carga-input:focus{outline:none;border-color:var(--red);}
  .carga-input.is-custom{border-color:var(--done);}
  .carga-unit{font-size:11px;color:var(--muted);}
  .carga-suggest{font-size:10px;color:var(--muted);background:var(--suggest);border-radius:4px;padding:1px 6px;white-space:nowrap;cursor:pointer;border:1px solid #1e4a30;}

  /* SEMANA ANTERIOR */
  .prev-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .prev-val{font-size:13px;font-weight:600;color:var(--muted);}
  .prev-val.empty{color:#444;font-size:11px;}
  .delta{font-size:10px;font-weight:700;border-radius:4px;padding:1px 5px;}
  .delta.up{color:var(--up);background:rgba(46,204,113,.1);}
  .delta.down{color:var(--down);background:rgba(224,48,48,.1);}
  .delta.same{color:var(--same);}

  /* DOTS */
  .series-dots{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;}
  .dot{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);cursor:pointer;transition:all .15s;background:transparent;}
  .dot:hover{border-color:var(--red);}
  .dot.checked{background:var(--done);border-color:var(--done);}

  /* NOTES */
  .notes-area{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 10px;font-family:'Inter',sans-serif;font-size:12px;resize:vertical;min-height:44px;margin-top:8px;transition:border-color .15s;}
  .notes-area:focus{outline:none;border-color:var(--red);}
  .notes-area::placeholder{color:var(--muted);}

  /* PSE */
  .pse-block{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-top:10px;display:flex;flex-direction:column;gap:12px;}
  .pse-row{display:flex;flex-direction:column;gap:6px;}
  .pse-label{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);}
  .pse-label span{color:var(--text);font-size:10px;font-weight:400;text-transform:none;letter-spacing:0;margin-left:6px;}
  .pse-btns{display:flex;gap:5px;flex-wrap:wrap;}
  .pse-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
  .pse-btn:hover{border-color:var(--red);color:var(--text);}
  .pse-btn.selected-disp{background:#1a3a2a;border-color:var(--done);color:var(--done);}
  .pse-btn.selected-pse-1,.pse-btn.selected-pse-2,.pse-btn.selected-pse-3{background:#1a3a2a;border-color:var(--done);color:var(--done);}
  .pse-btn.selected-pse-4,.pse-btn.selected-pse-5,.pse-btn.selected-pse-6,.pse-btn.selected-pse-7{background:#2a2a10;border-color:#e0b030;color:#e0b030;}
  .pse-btn.selected-pse-8,.pse-btn.selected-pse-9,.pse-btn.selected-pse-10{background:#3a1a1a;border-color:var(--red);color:var(--red);}
  .pse-hint{font-size:10px;color:var(--muted);margin-top:2px;}


  /* PSE */
  .pse-block{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-top:10px;display:flex;flex-direction:column;gap:12px;}
  .pse-row{display:flex;flex-direction:column;gap:6px;}
  .pse-label{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);}
  .pse-label span{color:var(--text);font-size:10px;font-weight:400;text-transform:none;letter-spacing:0;margin-left:6px;}
  .pse-btns{display:flex;gap:5px;flex-wrap:wrap;}
  .pse-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
  .pse-btn:hover{border-color:var(--red);color:var(--text);}
  .pse-btn.sel-disp{background:#1a3a2a;border-color:var(--done);color:var(--done);}
  .pse-btn.sel-easy{background:#1a3a2a;border-color:var(--done);color:var(--done);}
  .pse-btn.sel-mid{background:#2a2a10;border-color:#e0b030;color:#e0b030;}
  .pse-btn.sel-hard{background:#3a1a1a;border-color:var(--red);color:var(--red);}
  .pse-hint{font-size:10px;color:var(--muted);margin-top:2px;}



  /* TÉCNICA E FOCO */
  .tech-toggle{font-size:10px;color:#4a9eff;cursor:pointer;white-space:nowrap;margin-top:3px;display:inline-block;}
  .tech-toggle:hover{opacity:.8;}
  .tech-tip{display:none;font-size:11px;color:#aaa;background:#111;border-left:2px solid #4a9eff;padding:5px 8px;border-radius:0 5px 5px 0;margin-top:5px;line-height:1.4;}
  .tech-tip.open{display:block;}
  /* CARDIO CARD */
  .cardio-block{background:var(--surface);border:1px solid #1a2a3a;border-radius:8px;padding:12px 14px;margin-top:10px;}
  .cardio-title{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#4a9eff;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .cardio-options{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .cardio-btn{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
  .cardio-btn:hover{border-color:#4a9eff;color:var(--text);}
  .cardio-btn.sel-cardio{background:rgba(74,158,255,.15);border-color:#4a9eff;color:#4a9eff;}
  .cardio-row{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;}
  .cardio-lbl{font-size:11px;color:var(--muted);white-space:nowrap;}
  .cardio-dur{background:var(--surface);border:1px solid var(--border);color:var(--text);width:56px;padding:5px 6px;border-radius:6px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;text-align:center;-moz-appearance:textfield;}
  .cardio-dur::-webkit-outer-spin-button,.cardio-dur::-webkit-inner-spin-button{-webkit-appearance:none;}
  .cardio-dur:focus{outline:none;border-color:#4a9eff;}
  .cardio-note{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 8px;font-family:'Inter',sans-serif;font-size:12px;min-width:100px;}
  .cardio-note:focus{outline:none;border-color:#4a9eff;}
  .cardio-note::placeholder{color:var(--muted);}
  .save-row{display:flex;justify-content:flex-end;gap:10px;margin-top:10px;align-items:center;}
  .save-msg{font-size:11px;color:var(--done);opacity:0;transition:opacity .3s;}
  .save-msg.show{opacity:1;}
  .btn-save{background:var(--red);color:#fff;border:none;padding:7px 18px;border-radius:6px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;}
  .btn-save:hover{background:#c02828;}

  .rest-day{text-align:center;padding:30px 16px;color:var(--muted);font-size:13px;}
  .rest-day strong{display:block;font-size:22px;color:var(--text);margin-bottom:6px;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;}

  /* EVOLUÇÃO */
  .evo-section{margin-bottom:20px;}
  .evo-day-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--red);margin:18px 0 10px;}
  .evo-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
  .evo-ex-name{font-weight:600;font-size:13px;margin-bottom:10px;}
  .evo-chart{display:flex;align-items:flex-end;gap:6px;height:60px;}
  .evo-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
  .evo-bar{width:100%;background:var(--red-dim);border-radius:3px 3px 0 0;min-height:3px;transition:height .3s;}
  .evo-bar.current{background:var(--red);}
  .evo-bar.empty{background:var(--border);}
  .evo-wlabel{font-size:9px;color:var(--muted);text-align:center;}
  .evo-wval{font-size:10px;font-weight:700;color:var(--text);text-align:center;}
  .evo-empty{color:var(--muted);font-size:12px;padding:8px 0;}

  .legend{font-size:10px;color:var(--muted);margin-bottom:12px;display:flex;gap:14px;flex-wrap:wrap;}

  @media(max-width:580px){
    .ex-table th:nth-child(5),.ex-table td:nth-child(5){display:none;}
  }
</style>
</head>

  <div class="header-row">
    <div class="logo">PROJETO ETERNO</div>

const TOTAL_WEEKS=12;
function key(w,d,i,f){return `pe_w${w}_${d}_e${i}_${f}`;}
function getVal(k){return localStorage.getItem(k)||'';}
function setVal(k,v){localStorage.setItem(k,v);}

function getPseHint(v){
  if(v<=3) return 'Fácil — considere subir a carga na próxima semana';
  if(v<=6) return 'Moderado — dentro da zona controlada';
  if(v<=8) return 'Pesado — zona ideal do protocolo';
  return 'Limite — monitore sono e recuperação';
}
function setDisp(k,v,btn,w,dayId){
  setVal(k,v);
  const DISP_H=['Esgotado','Cansado','Normal','Bem disposto','No limite!'];
  document.querySelectorAll(`#disp-${w}-${dayId} .pse-btn`).forEach(b=>b.classList.remove('sel-disp'));
  btn.classList.add('sel-disp');
  const hint=document.getElementById(`disp-hint-${w}-${dayId}`);
  if(hint) hint.textContent=DISP_H[v-1];
}
function setPse(k,v,btn,w,dayId){
  setVal(k,v);
  const cls=v<=3?'sel-easy':v<=7?'sel-mid':'sel-hard';
  document.querySelectorAll(`#pse-${w}-${dayId} .pse-btn`).forEach(b=>b.classList.remove('sel-easy','sel-mid','sel-hard'));
  btn.classList.add(cls);
  const hint=document.getElementById(`pse-hint-${w}-${dayId}`);
  if(hint) hint.textContent=getPseHint(v);
}


const CARDIO_OPTS = [
  {id:'esteira', label:'🏃 Esteira inclinada', hint:'20–40 min · inclinação 8–12% · pace leve'},
  {id:'bike',    label:'🚴 Bike ergométrica', hint:'30–45 min · zona 2 · LISS'},
  {id:'hiit',    label:'⚡ HIIT bike', hint:'8–10 tiros · 20s forte / 40s leve · só Dia 6'},
  {id:'caminhada',label:'🚶 Caminhada', hint:'30–45 min · 8.000–10.000 passos diários'},
  {id:'nada',    label:'❌ Sem cardio', hint:'Dia de descanso ou recuperação'},
];

function buildCardioHTML(w, dayId){
  const typeK=`pe_w${w}_${dayId}_cardio_type`;
  const durK=`pe_w${w}_${dayId}_cardio_dur`;
  const noteK=`pe_w${w}_${dayId}_cardio_note`;
  const typeV=getVal(typeK)||'esteira';
  const durV=getVal(durK)||'30';
  const noteV=getVal(noteK);

  const btns=CARDIO_OPTS.map(o=>{
    const sel=typeV===o.id?'sel-cardio':'';
    return `<button class="cardio-btn ${sel}" onclick="setCardioType('${typeK}','${o.id}',this,'${w}','${dayId}')" title="${o.hint}">${o.label}</button>`;
  }).join('');

  const hint=CARDIO_OPTS.find(o=>o.id===typeV)?.hint||'';

  return `<div class="cardio-block">
    <div class="cardio-title">🫀 CARDIO DO DIA</div>
    <div class="cardio-options" id="cardio-opts-${w}-${dayId}">${btns}</div>
    <div style="font-size:10px;color:#4a9eff;margin-bottom:8px;" id="cardio-hint-${w}-${dayId}">${hint}</div>
    <div class="cardio-row">
      <span class="cardio-lbl">Duração:</span>
      <input class="cardio-dur" type="number" min="0" max="120" step="5" value="${durV}"
        onchange="setVal('${durK}',this.value)">
      <span class="cardio-lbl">min</span>
      <input class="cardio-note" placeholder="Observação do cardio…" value="${noteV}"
        oninput="setVal('${noteK}',this.value)">
    </div>
  </div>`;
}

function setCardioType(k,val,btn,w,dayId){
  setVal(k,val);
  document.querySelectorAll(`#cardio-opts-${w}-${dayId} .cardio-btn`).forEach(b=>b.classList.remove('sel-cardio'));
  btn.classList.add('sel-cardio');
  const hint=CARDIO_OPTS.find(o=>o.id===val)?.hint||'';
  const hintEl=document.getElementById(`cardio-hint-${w}-${dayId}`);
  if(hintEl) hintEl.textContent=hint;
}

function getPrevCarga(w,dayId,i){
  if(w<=1) return null;
  const v=getVal(key(w-1,dayId,i,'carga'));
  return v===''?null:parseFloat(v);
}

// NAV
const nav=document.getElementById('weekNav');
const mainEl=document.getElementById('main');
for(let w=1;w<=TOTAL_WEEKS;w++){
  const btn=document.createElement('button');
  btn.className='week-btn'+(w===1?' active':'');
  btn.textContent=`S${w}`;
  btn.dataset.week=w;
  btn.addEventListener('click',()=>showWeek(w));
  nav.appendChild(btn);
}

// BUILD ALL WEEKS
for(let w=1;w<=TOTAL_WEEKS;w++){
  const block=document.createElement('div');
  block.className='week-block'+(w===1?' visible':'');
  block.id=`week-${w}`;
  block.innerHTML=buildWeekHTML(w);
  mainEl.appendChild(block);
  bindWeekEvents(w,block);
}

function buildWeekHTML(w){
  const trainingDays=DAYS.filter(d=>!d.rest);
  const daysHTML=DAYS.map(d=>buildDayHTML(w,d)).join('');
  const evoHTML=buildEvoHTML(w);
  return `
    <div class="summary-bar">
      <div class="stat"><div class="stat-val" id="sv-s-${w}">0</div><div class="stat-lbl">Sessões</div></div>
      <div class="stat"><div class="stat-val" id="sv-e-${w}">0</div><div class="stat-lbl">Exercícios</div></div>
      <div class="stat"><div class="stat-val">${w}/12</div><div class="stat-lbl">Semana</div></div>
    </div>
    <div class="week-title">SEMANA ${w}</div>
    <div class="week-meta">Push · Pull · Legs · 6 dias</div>
    <div class="view-tabs">
      <button class="view-tab active" onclick="switchView(${w},'treino',this)">🏋️ TREINO</button>
      <button class="view-tab" onclick="switchView(${w},'evolucao',this)">📈 EVOLUÇÃO</button>
    </div>
    <div class="week-view visible" id="view-treino-${w}">${daysHTML}</div>
    <div class="week-view" id="view-evolucao-${w}">${evoHTML}</div>`;
}

function buildDayHTML(w,day){
  if(day.rest) return `
    <div class="day-card">
      <div class="rest-day"><strong>DESCANSO ATIVO</strong>Caminhada, mobilidade e recuperação.</div>
    </div>`;

  const sugList=SUGGEST[day.id]||[];
  const sugLabels=SUGGEST_LABEL[day.id]||[];

  const rows=day.exercises.map((ex,i)=>{
    const dotsHTML=Array.from({length:ex.series},(_,s)=>{
      const k=key(w,day.id,i,`s${s}`);
      const checked=getVal(k)==='1';
      return `<div class="dot${checked?' checked':''}" data-key="${k}"></div>`;
    }).join('');

    const cargaK=key(w,day.id,i,'carga');
    const cargaV=getVal(cargaK);
    const isCustom=cargaV!==''?' is-custom':'';
    const sugVal=sugList[i]||0;
    const sugLbl=sugLabels[i]||'';
    const sugHTML=sugVal>0
      ?`<span class="carga-suggest" onclick="applySuggest(this,'${cargaK}',${sugVal},'${w}','${day.id}')">≈${sugLbl}</span>`
      :`<span style="font-size:10px;color:#444">corpo</span>`;

    // semana anterior
    const prev=getPrevCarga(w,day.id,i);
    let prevHTML='';
    if(w===1){
      prevHTML=`<div class="prev-wrap"><span class="prev-val empty">—</span></div>`;
    } else if(prev===null){
      prevHTML=`<div class="prev-wrap"><span class="prev-val empty">sem registro</span></div>`;
    } else {
      const cur=cargaV!==''?parseFloat(cargaV):null;
      let deltaHTML='';
      if(cur!==null){
        const diff=cur-prev;
        if(diff>0) deltaHTML=`<span class="delta up">▲ +${diff}kg</span>`;
        else if(diff<0) deltaHTML=`<span class="delta down">▼ ${diff}kg</span>`;
        else deltaHTML=`<span class="delta same">= igual</span>`;
      }
      prevHTML=`<div class="prev-wrap"><span class="prev-val">${prev}kg</span>${deltaHTML}</div>`;
    }

    return `
      <tr>
        <td>
          <div class="ex-name">${ex.name}</div>
          <div class="ex-meta">${ex.series}×${ex.reps} · ${ex.intervalo}</div>
        </td>
        <td class="center"><div class="ex-tempo">${ex.tempo}</div></td>
        <td>
          <div class="carga-wrap">
            <div class="carga-cell">
              <input class="carga-input${isCustom}" type="number" step="0.5" min="0"
                placeholder="—" value="${cargaV}"
                data-key="${cargaK}" data-week="${w}" data-day="${day.id}">
              <span class="carga-unit">kg</span>
            </div>
            ${sugHTML}
          </div>
        </td>
        <td>${prevHTML}</td>
        <td><div class="series-dots">${dotsHTML}</div></td>
      </tr>`;
  }).join('');

  const notesK=key(w,day.id,'notes','v');
  const notesV=getVal(notesK);
  const dispK=key(w,day.id,'disp','v');
  const pseK=key(w,day.id,'pse','v');
  const dispV=getVal(dispK);
  const pseV=getVal(pseK);
  const DISP_E=['😴','😕','😐','💪','🔥'];
  const DISP_H=['Esgotado','Cansado','Normal','Bem disposto','No limite!'];
  const dispBtns=DISP_E.map((e,idx)=>{
    const v=idx+1;
    const sel=dispV==String(v)?'sel-disp':'';
    return `<button class="pse-btn ${sel}" onclick="setDisp('${dispK}',${v},this,'${w}','${day.id}')" title="${DISP_H[idx]}">${e}</button>`;
  }).join('');
  const pseBtns=Array.from({length:10},(_,idx)=>{
    const v=idx+1;
    const cls=v<=3?'sel-easy':v<=7?'sel-mid':'sel-hard';
    const sel=pseV==String(v)?cls:'';
    return `<button class="pse-btn ${sel}" onclick="setPse('${pseK}',${v},this,'${w}','${day.id}')">${v}</button>`;
  }).join('');

  return `
    <div class="day-card" id="${w}-${day.id}">
      <div class="day-header">
        <div class="day-badge">${day.label}</div>
        <div class="day-name">${day.name}</div>
        <div class="day-progress" id="prog-${w}-${day.id}">0/${day.exercises.length}</div>
        <div class="chevron">▾</div>
      </div>
      <div class="day-body">
        <table class="ex-table">
          <thead><tr>
            <th>Exercício</th>
            <th class="center">Tempo</th>
            <th class="center">Carga atual</th>
            <th class="center">Sem. anterior</th>
            <th class="center">Séries ✓</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="pse-block">
          <div class="pse-row">
            <div class="pse-label">Disposição do dia <span>como você chegou na academia</span></div>
            <div class="pse-btns" id="disp-${w}-${day.id}">${dispBtns}</div>
            <div class="pse-hint" id="disp-hint-${w}-${day.id}">${dispV?DISP_H[parseInt(dispV)-1]:'Como você chegou hoje?'}</div>
          </div>
          <div class="pse-row">
            <div class="pse-label">PSE do treino <span>dificuldade geral da sessão · 1 fácil → 10 limite</span></div>
            <div class="pse-btns" id="pse-${w}-${day.id}">${pseBtns}</div>
            <div class="pse-hint" id="pse-hint-${w}-${day.id}">${pseV?getPseHint(parseInt(pseV)):'Zona ideal do protocolo: 7–8'}</div>
          </div>
        </div>
        <textarea class="notes-area" placeholder="Observações da sessão…" data-key="${notesK}">${notesV}</textarea>
        ${buildCardioHTML(w, day.id)}
        <div class="save-row">
          <span class="save-msg" id="saved-${w}-${day.id}">✓ Salvo</span>
          <button class="btn-save" data-week="${w}" data-day="${day.id}">Salvar sessão</button>
        </div>
      </div>
    </div>`;
}

function buildEvoHTML(w){
  if(w===1) return `<div style="color:var(--muted);font-size:13px;padding:20px 0;">O gráfico de evolução aparece a partir da semana 2, conforme você registra as cargas.</div>`;

  let html='';
  DAYS.forEach(day=>{
    if(day.rest) return;
    html+=`<div class="evo-day-title">${day.label} · ${day.name}</div>`;
    day.exercises.forEach((ex,i)=>{
      // gather all weeks up to current
      const vals=[];
      for(let ww=1;ww<=w;ww++){
        const v=getVal(key(ww,day.id,i,'carga'));
        vals.push(v===''?null:parseFloat(v));
      }
      const hasAny=vals.some(v=>v!==null);
      if(!hasAny){
        html+=`<div class="evo-card"><div class="evo-ex-name">${ex.name}</div><div class="evo-empty">Sem registros ainda.</div></div>`;
        return;
      }
      const max=Math.max(...vals.filter(v=>v!==null),1);
      const bars=vals.map((v,idx)=>{
        const isCur=idx===w-1;
        const pct=v!==null?Math.max(8,Math.round((v/max)*100)):0;
        const cls=v===null?'evo-bar empty':isCur?'evo-bar current':'evo-bar';
        const label=v!==null?`${v}kg`:'—';
        return `<div class="evo-bar-wrap">
          <div class="evo-wval">${label}</div>
          <div class="${cls}" style="height:${pct}%"></div>
          <div class="evo-wlabel">S${idx+1}</div>
        </div>`;
      }).join('');
      html+=`<div class="evo-card"><div class="evo-ex-name">${ex.name}</div><div class="evo-chart">${bars}</div></div>`;
    });
  });
  return `<div class="evo-section">${html}</div>`;
}

function switchView(w,view,btn){
  document.querySelectorAll(`#week-${w} .week-view`).forEach(v=>v.classList.remove('visible'));
  document.querySelectorAll(`#week-${w} .view-tab`).forEach(b=>b.classList.remove('active'));
  document.getElementById(`view-${view}-${w}`).classList.add('visible');
  btn.classList.add('active');
  // rebuild evo on demand so it reflects latest data
  if(view==='evolucao'){
    document.getElementById(`view-evolucao-${w}`).innerHTML=buildEvoHTML(w);
  }
}

function applySuggest(el,k,val,w,dayId){
  setVal(k,val);
  const input=document.querySelector(`input[data-key="${k}"]`);
  if(input){input.value=val;input.classList.add('is-custom');}
  updateProgress(w,document.getElementById(`week-${w}`));
  // refresh prev delta
  rebuildRow(input,w,dayId);
}

function rebuildRow(input,w,dayId){
  // lightweight: just refresh the delta cell if needed — handled on next render
}

function bindWeekEvents(w,block){
  block.querySelectorAll('.day-header').forEach(h=>{
    h.addEventListener('click',()=>h.closest('.day-card').classList.toggle('open'));
  });
  block.querySelectorAll('.dot').forEach(dot=>{
    dot.addEventListener('click',()=>{
      dot.classList.toggle('checked');
      setVal(dot.dataset.key,dot.classList.contains('checked')?'1':'0');
      updateProgress(w,block);
    });
  });
  block.querySelectorAll('.carga-input').forEach(input=>{
    input.addEventListener('change',()=>{
      setVal(input.dataset.key,input.value);
      input.classList.toggle('is-custom',input.value!=='');
      updateProgress(w,block);
      // update delta display live
      updateDelta(input,w);
    });
  });
  block.querySelectorAll('.notes-area').forEach(ta=>{
    ta.addEventListener('input',()=>setVal(ta.dataset.key,ta.value));
  });
  block.querySelectorAll('.btn-save').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const msg=document.getElementById(`saved-${w}-${btn.dataset.day}`);
      msg.classList.add('show');
      setTimeout(()=>msg.classList.remove('show'),2000);
      updateProgress(w,block);
    });
  });
  updateProgress(w,block);
}

function updateDelta(input,w){
  // find the prev-wrap td sibling and refresh
  const td=input.closest('td');
  if(!td) return;
  const row=td.closest('tr');
  if(!row) return;
  const prevTd=row.querySelectorAll('td')[3];
  if(!prevTd) return;
  const k=input.dataset.key;
  // parse day and ex index from key: pe_wW_DX_eI_carga
  const match=k.match(/pe_w(\d+)_(D\d)_e(\d+)_carga/);
  if(!match) return;
  const [,ww,dayId,ei]=match;
  const i=parseInt(ei);
  const prev=getPrevCarga(parseInt(ww),dayId,i);
  const cur=input.value!==''?parseFloat(input.value):null;
  if(prev===null||w<=1){prevTd.innerHTML=`<div class="prev-wrap"><span class="prev-val empty">${w<=1?'—':'sem registro'}</span></div>`;return;}
  let deltaHTML='';
  if(cur!==null){
    const diff=cur-prev;
    if(diff>0) deltaHTML=`<span class="delta up">▲ +${diff}kg</span>`;
    else if(diff<0) deltaHTML=`<span class="delta down">▼ ${diff}kg</span>`;
    else deltaHTML=`<span class="delta same">= igual</span>`;
  }
  prevTd.innerHTML=`<div class="prev-wrap"><span class="prev-val">${prev}kg</span>${deltaHTML}</div>`;
}

function updateProgress(w,block){
  let sessions=0,exercises=0;
  DAYS.forEach(day=>{
    if(day.rest) return;
    let done=0;
    day.exercises.forEach((_,i)=>{if(getVal(key(w,day.id,i,'carga'))!=='') done++;});
    const total=day.exercises.length;
    const prog=document.getElementById(`prog-${w}-${day.id}`);
    if(prog){prog.textContent=`${done}/${total}`;prog.className='day-progress'+(done===total?' done':'');}
    if(done===total) sessions++;
    exercises+=done;
  });
  const svS=document.getElementById(`sv-s-${w}`);
  const svE=document.getElementById(`sv-e-${w}`);
  if(svS) svS.textContent=sessions;
  if(svE) svE.textContent=exercises;
}

function showWeek(w){
  document.querySelectorAll('.week-block').forEach(b=>b.classList.remove('visible'));
  document.querySelectorAll('.week-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`week-${w}`).classList.add('visible');
  document.querySelector(`.week-btn[data-week="${w}"]`).classList.add('active');
}
